name: Build & Test

on:
  push:
    paths-ignore:
      - '**.md'
      - 'clockfaces/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'clockfaces/**'
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate version.txt and platformio.ini match
        run: |
          FILE_VERSION="$(tr -d '[:space:]' < version.txt)"
          PIO_VERSION="$(grep -oE 'CW_FW_VERSION="\\"[0-9]+\.[0-9]+\.[0-9]+\\""' firmware/platformio.ini | sed -E 's/.*\\"([0-9]+\.[0-9]+\.[0-9]+)\\""/\1/')"

          if [ -z "$FILE_VERSION" ] || [ -z "$PIO_VERSION" ]; then
            echo "Could not parse version values"
            echo "version.txt='$FILE_VERSION' platformio='$PIO_VERSION'"
            exit 1
          fi

          if [ "$FILE_VERSION" != "$PIO_VERSION" ]; then
            echo "Version mismatch detected"
            echo "version.txt=$FILE_VERSION"
            echo "firmware/platformio.ini CW_FW_VERSION=$PIO_VERSION"
            exit 1
          fi

          echo "Version sync OK: $FILE_VERSION"

  test-native:
    uses: ./.github/workflows/test-native.yml
    needs: version-sync

  build:
    name: ESP-IDF Build (${{ matrix.idf_version }})
    runs-on: ubuntu-latest
    needs: test-native  # only runs if version sync + tests pass

    strategy:
      fail-fast: false
      matrix:
        idf_version:
          - v4.4.7   # IDF v4.4.x required by arduino-esp32 component

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0  # needed for git describe --tags

      - name: Get version
        id: version
        run: echo "tag=$(git describe --tags --always --dirty)" >> $GITHUB_OUTPUT

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf_version }}
          target: esp32
          # Rename inside the container — build/ is root-owned by the Docker action
          # so steps outside the container cannot write to it
          command: idf.py build && cp build/clockwise-paradise.bin build/clockwise-paradise.${{ steps.version.outputs.tag }}.bin

      - name: Upload firmware artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: clockwise-paradise-${{ steps.version.outputs.tag }}
          path: |
            build/clockwise-paradise.${{ steps.version.outputs.tag }}.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
          if-no-files-found: error
          retention-days: 30
