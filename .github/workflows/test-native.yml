name: Native Test Workflow

on:
  workflow_call:

jobs:
  test-native:
    name: Native Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get install -y cmake ninja-build cppcheck

      - name: Cppcheck gate
        run: make cppcheck-ci

      - name: Check for native tests
        id: check_tests
        run: |
          if [ -d "firmware/test/test_native" ] && [ -f "firmware/test/test_native/CMakeLists.txt" ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "No native tests found — skipping"
          fi

      - name: Build and run native tests
        if: steps.check_tests.outputs.has_tests == 'true'
        run: |
          cd firmware/test/test_native
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build
          ./build/test_native
