name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag name (e.g. v2.6.2)'
        type: string
        required: true
      prerelease:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create and release from main (e.g. v2.6.0)'
        required: true
      prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        default: false

jobs:
  test-native:
    name: Native Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get install -y cmake ninja-build

      - name: Build and run native tests
        run: |
          cd firmware/test/test_native
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build
          ./build/test_native

  build-and-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: test-native
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Resolve tag name
        id: tag
        run: echo "name=${{ inputs.tag || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v4.4.7
          target: esp32
          # Stage assets inside the container — build/ is root-owned by the Docker action
          command: >-
            idf.py build &&
            mkdir -p release-assets &&
            cp build/clockwise-paradise.bin release-assets/clockwise-paradise.${{ inputs.tag || github.ref_name }}.bin &&
            cp build/bootloader/bootloader.bin release-assets/bootloader.bin &&
            cp build/partition_table/partition-table.bin release-assets/partition-table.bin

      # Only create the tag for manual runs — release-please already owns it on workflow_call
      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag ${{ steps.tag.outputs.name }}
          git push origin ${{ steps.tag.outputs.name }}

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          ASSETS="release-assets/clockwise-paradise.${TAG}.bin release-assets/bootloader.bin release-assets/partition-table.bin"
          PRERELEASE=${{ inputs.prerelease == true && '--prerelease' || '' }}

          # release-please already created the GitHub release — upload assets to it.
          # For manual workflow_dispatch, create the release from scratch.
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" $ASSETS
          else
            gh release create "$TAG" $ASSETS \
              --title "${TAG} — Clockwise Paradise" \
              --generate-notes \
              $PRERELEASE
          fi
