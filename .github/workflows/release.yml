name: Release

on:
  push:
    tags:
      - 'v*'   # triggered automatically by release-please when Release PR is merged
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (emergency manual use only)'
        required: true
      prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        default: false

jobs:
  test-native:
    name: Native Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install build tools
        run: sudo apt-get install -y cmake ninja-build

      - name: Build and run native tests
        run: |
          cd firmware/test/test_native
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build
          ./build/test_native

  build-and-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: test-native
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          submodules: 'recursive'
          fetch-depth: 0

      - name: Resolve tag name
        id: tag
        run: echo "name=${{ inputs.tag || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v4.4.7
          target: esp32
          # Stage assets inside the container — build/ is root-owned by the Docker action
          command: >-
            idf.py build &&
            mkdir -p release-assets &&
            cp build/clockwise-paradise.bin release-assets/clockwise-paradise.${{ steps.tag.outputs.name }}.bin &&
            cp build/bootloader/bootloader.bin release-assets/bootloader.bin &&
            cp build/partition_table/partition-table.bin release-assets/partition-table.bin

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.tag.outputs.name }} \
            release-assets/clockwise-paradise.${{ steps.tag.outputs.name }}.bin \
            release-assets/bootloader.bin \
            release-assets/partition-table.bin \
            --title "${{ steps.tag.outputs.name }} — Clockwise Paradise" \
            --generate-notes \
            ${{ inputs.prerelease == 'true' && '--prerelease' || '' }}
